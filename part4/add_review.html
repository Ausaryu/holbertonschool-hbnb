<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Review</title>
  <link rel="icon" type="image/png" href="hbnb/images/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <img src="hbnb/images/logo.png" alt="Application logo" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html" class="login-button">Login</a>
    </nav>
  </header>

  <main>
    <div class="review-container">
      <h1>Add a Review</h1>

      <section class="place-summary">
        <h2>Place Summary</h2>
        <p><strong>Name:</strong> Cozy Apartment</p>
        <p><strong>Host:</strong> John Doe</p>
        <p><strong>Price:</strong> $120 per night</p>
      </section>

      <form id="review-form" class="review-form">
        <label for="review">Your Review:</label>
        <textarea id="review" name="review" rows="6" required></textarea>

        <label for="rating">Rating:</label>
        <select id="rating" name="rating" required>
          <option value="" selected disabled>Choose a rating</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <button type="submit">Submit Review</button>
      </form>
    </div>
  </main>

  <footer>
    <p>All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>

</html>
