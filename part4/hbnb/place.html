<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Details</title>
  <link rel="icon" href="images/assets/favicon.ico" type="image/ico">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages/place.css">
  <script type="module" src="scripts/main.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="site-container">
      <nav class="site-nav">
        <a class="site-brand" href="index.html">
          <img src="images/assets/logo.png" alt="Hbnb logo" class="site-logo">
          <span>Hbnb</span>
        </a>
        <div class="site-actions">
          <a href="index.html" class="button button--light">Home</a>
          <a href="login.html" id="login-link" class="button button--ghost">Login</a>
          <button id="logout" class="button button--ghost" type="button">Logout</button>
        </div>
      </nav>
    </div>
  </header>

  <main class="place-page">
    <section id="place-details" class="panel place-detail">
      <section id="place-gallery"></section>
      <div class="place-detail-content">
        <h1 class="place-title">N/A</h1>
        <div class="info-grid">
          <div>
            <div class="info-chip"><strong>Host:</strong> N/A</div>
          </div>
          <div>
            <div class="info-chip"><strong>Price per night:</strong> N/A</div>
          </div>
          <div>
            <div class="info-chip"><strong>Description:</strong> N/A</div>
          </div>
          <div>
            <div class="info-chip">
              <strong>Amenities:</strong>
              <ul>
                <li>N/A</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="page-stack">
      <section class="review-part">
        <h2 class="section-title">Guest reviews</h2>
        <section id="reviews" class="place-cards-grid">
          <article class="review-card">
            <div class="card">
              <div class="card-content">
                <p><strong>User:</strong> N/A</p>
                <p><strong>Rating:</strong> N/A</p>
                <p class="text-muted">N/A</p>
              </div>
            </div>
          </article>
        </section>
        <section id="review-btn" class="review-actions"></section>
      </section>
    </section>
  </main>

  <div class="lightbox" id="placeImageModal" aria-hidden="true">
    <div class="lightbox-content">
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
      <button type="button" class="lightbox-nav lightbox-nav--prev" id="lightbox-prev"
        aria-label="Previous image">‹</button>
      <img id="lightbox-image" class="lightbox-image" src="" alt="Place image">
      <button type="button" class="lightbox-nav lightbox-nav--next" id="lightbox-next"
        aria-label="Next image">›</button>
      <p id="lightbox-status" class="visually-hidden" aria-live="polite"></p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="site-container">
      <p class="text-muted">© 2026 Cosmic Corp. All rights reserved. Exploring ideas beyond the stars.</p>
    </div>
  </footer>
</body>

</html>
