<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Details</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <section id="place-details">
      <h1>PlaceHolder</h1>

      <div class="place-info">
        <p><strong>Host:</strong> Alice</p>
        <p><strong>Price per night:</strong> $120</p>
        <p><strong>Description:</strong> A cozy apartment in the city center.</p>
        <p><strong>Amenities:</strong> Wi-Fi, Kitchen, Air conditioning</p>
      </div>
    </section>
    <section id="reviews">
      <h2>Reviews</h2>
      <!-- Reviews will be populated dynamically -->

      <article class="review-card">
        <p><strong>User:</strong> John</p>
        <p><strong>Rating:</strong> 5/5</p>
        <p>Amazing place, very clean and comfortable.</p>
      </article>

      <article class="review-card">
        <p><strong>User:</strong> Emma</p>
        <p><strong>Rating:</strong> 4/5</p>
        <p>Very nice stay, great location.</p>
      </article>
    </section>
    <section id="add-review">
      <h2>Add a Review</h2>
      <form id="review-form">
        <label for="review-text">Review:</label>
        <textarea id="review-text" name="review-text" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </section>
  </main>
  <script src="scripts.js"></script>
</body>

</html>
