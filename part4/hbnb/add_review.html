<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Review</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="icon" href="images/assets/favicon.ico" type="image/ico">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="scripts/main.js"></script>
</head>

<body>
  <header class="site-header shadow-sm">
    <nav class="navbar navbar-expand-lg">
      <div class="container py-1">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold text-white m-0" href="index.html">
          <img src="images/assets/logo.png" alt="Hbnb logo" class="site-logo">
          <span>Hbnb</span>
        </a>
        <div class="d-flex align-items-center gap-2 ms-auto">
          <a href="index.html" class="btn btn-light btn-sm">Home</a>
          <a href="login.html" id="login-link" class="btn btn-outline-light btn-sm">Login</a>
          <button id="logout" class="btn btn-dark btn-sm" type="button">Logout</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="add-review-page py-5">
    <section class="container">
      <section id="add-review" class="card border-0 shadow-sm p-4">
        <h2 class="h3 mb-3">Add a Review</h2>
        <form id="review-form">
          <div class="mb-3">
            <label for="rating" class="form-label">Rating</label>
            <div id="rating-stars" class="rating-stars">
              <span data-value="1">★</span>
              <span data-value="2">★</span>
              <span data-value="3">★</span>
              <span data-value="4">★</span>
              <span data-value="5">★</span>
            </div>

            <input type="hidden" id="rating" value="">
          </div>

          <div class="mb-3">
            <label for="review-text" class="form-label">Review</label>
            <textarea id="review-text" name="review-text" class="form-control" rows="5" required></textarea>
          </div>

          <button type="submit" class="btn btn-warning">Submit</button>
        </form>
      </section>
    </section>
  </main>

  <footer class="site-footer py-4 mt-auto">
    <div class="container text-center text-secondary">
      <p class="mb-0">© 2026 Cosmic Corp. All rights reserved. Exploring ideas beyond the stars.</p>
    </div>
  </footer>
</body>

</html>
