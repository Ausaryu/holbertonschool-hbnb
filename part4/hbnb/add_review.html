<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="icon" href="images/favicon.ico" type="image/ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header shadow-sm">
        <nav class="navbar navbar-expand-lg">
            <div class="container py-2">
                <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold text-white m-0" href="index.html">
                    <img src="images/logo.png" alt="Hbnb logo" class="site-logo">
                    <span>Hbnb</span>
                </a>
                <div class="d-flex align-items-center gap-2 ms-auto">
                    <a href="index.html" class="btn btn-light btn-sm">Home</a>
                    <a href="login.html" id="login-link" class="btn btn-outline-light btn-sm">Login</a>
                    <button id="logout" class="btn btn-dark btn-sm" type="button">Logout</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="py-5">
        <section class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <form id="review-form" class="card border-0 shadow-sm p-4 p-lg-5">
                        <h1 class="h3 mb-4">Add a Review</h1>

                        <div class="mb-3">
                            <label for="review" class="form-label">Your Review</label>
                            <textarea id="review" name="review" class="form-control" rows="5" required></textarea>
                        </div>

                        <div class="mb-4">
                            <label for="rating" class="form-label">Rating</label>
                            <select id="rating" name="rating" class="form-select" required>
                                <!-- Options for rating -->
                            </select>
                        </div>

                        <button type="submit" class="btn btn-warning">Submit Review</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer py-4 mt-auto">
        <div class="container text-center text-secondary">
            <p class="mb-0">© 2026 Cosmic Corp. All rights reserved. Exploring ideas beyond the stars.</p>
        </div>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
