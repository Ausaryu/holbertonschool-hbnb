<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List of Places</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <img src="images/logo.png" alt="logo.png">
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html" id="login-link">Login</a>
      <button id="logout">Logout</button>
    </nav>
  </header>
  <main>
    <section id="filter">
      <label for="price-filter">Max Price:</label>
      <select id="price-filter">
        <!-- Options will be populated dynamically -->
      </select>
    </section>
    <section id="places-list">
      <!-- List of places will be populated dynamically -->

      <h2>Available Places</h2>

      <article class="place-card">
        <h3>Cozy Apartment</h3>
        <p>Price: $120/night</p>
        <button class="details-button"><a href="place.html">View Details</a></button>
      </article>

      <article class="place-card">
        <h3>Modern Studio</h3>
        <p>Price: $90/night</p>
        <button class="details-button">View Details</button>
      </article>
    </section>
  </main>
  <footer>
    <p>© 2026 Cosmic Corp. All rights reserved. Exploring ideas beyond the stars.</p>
  </footer>
  <script src="scripts.js"></script>
</body>

</html>
