<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="icon" href="images/assets/favicon.ico" type="image/ico">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages/login.css">
  <script type="module" src="scripts/main.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="site-container">
      <nav class="site-nav">
        <a class="site-brand" href="index.html">
          <img src="images/assets/logo.png" alt="Hbnb logo" class="site-logo">
          <span>Hbnb</span>
        </a>
        <div class="site-actions">
          <a href="index.html" class="button button--light">Home</a>
          <a href="login.html" id="login-link" class="button button--ghost">Login</a>
          <button id="logout" class="button button--ghost" type="button">Logout</button>
        </div>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <form id="login-form" class="panel auth-panel">
      <h1 class="auth-title">Login</h1>

      <div class="field">
        <label for="email" class="field-label">Email</label>
        <input type="email" id="email" name="email" class="input" required>
      </div>

      <div class="field">
        <label for="password" class="field-label">Password</label>
        <input type="password" id="password" name="password" class="input" required>
      </div>

      <div class="field">
        <button type="submit" class="button button--primary button--block">Login</button>
      </div>
      <p id="error-login" class="form-error"></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="site-container">
      <p class="text-muted">© 2026 Cosmic Corp. All rights reserved. Exploring ideas beyond the stars.</p>
    </div>
  </footer>
</body>

</html>
